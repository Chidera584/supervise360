<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Supervise360 - Student supervision management system for universities" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Supervise360 - Student Supervision Management</title>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading screen - replaced when app mounts -->
      <div id="app-loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;font-family:system-ui,-apple-system,sans-serif">
        <div style="position:fixed;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#c41e3a,#e63950,#c41e3a)"></div>
        <div style="padding:20px;border-radius:16px;background:linear-gradient(135deg,#0f172a,#312e81);box-shadow:0 10px 40px rgba(15,23,42,0.35)">
          <img src="/logo.png" alt="Supervise360" width="48" height="48" style="display:block;object-fit:contain;border-radius:12px" />
        </div>
        <p style="margin:24px 0 16px;font-size:18px;font-weight:600;background:linear-gradient(90deg,#4f46e5,#0f172a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Supervise360</p>
        <div style="width:48px;height:48px;border:2px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <p style="margin:16px 0 0;font-size:14px;color:#64748b;font-weight:500">Loading...</p>
        <div style="margin-top:24px;width:64px;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,rgba(196,30,58,0.6),transparent)"></div>
        <p style="position:fixed;bottom:24px;font-size:12px;color:#94a3b8">Student Project Management System</p>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
