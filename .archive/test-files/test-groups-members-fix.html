<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Groups Members Fix</title>
</head>
<body>
    <h1>Test Groups Members Fix</h1>
    <div id="output"></div>

    <script>
        // Test the fix for group.members.map error
        function testGroupMembersFix() {
            const output = document.getElementById('output');
            
            // Test cases that would previously cause "group.members.map is not a function" error
            const testCases = [
                {
                    name: 'Valid array members',
                    group: {
                        id: 1,
                        name: 'Group A',
                        members: [
                            { name: 'John Doe', gpa: 4.0, tier: 'HIGH' },
                            { name: 'Jane Smith', gpa: 3.5, tier: 'MEDIUM' },
                            { name: 'Bob Johnson', gpa: 3.0, tier: 'LOW' }
                        ]
                    }
                },
                {
                    name: 'Null members',
                    group: {
                        id: 2,
                        name: 'Group B',
                        members: null
                    }
                },
                {
                    name: 'Undefined members',
                    group: {
                        id: 3,
                        name: 'Group C',
                        members: undefined
                    }
                },
                {
                    name: 'String members (legacy format)',
                    group: {
                        id: 4,
                        name: 'Group D',
                        members: 'John Doe (4.0), Jane Smith (3.5), Bob Johnson (3.0)'
                    }
                },
                {
                    name: 'Empty array members',
                    group: {
                        id: 5,
                        name: 'Group E',
                        members: []
                    }
                }
            ];

            testCases.forEach(testCase => {
                try {
                    const group = testCase.group;
                    
                    // Apply the same fix logic as in the components
                    const members = Array.isArray(group.members) ? group.members : [];
                    
                    // Test the map operation
                    const memberNames = members.map(member => member.name || 'Unknown');
                    
                    output.innerHTML += `
                        <div style="margin: 10px 0; padding: 10px; border: 1px solid #ccc;">
                            <h3 style="color: green;">✅ ${testCase.name}</h3>
                            <p><strong>Group:</strong> ${group.name}</p>
                            <p><strong>Members type:</strong> ${typeof group.members}</p>
                            <p><strong>Is array:</strong> ${Array.isArray(group.members)}</p>
                            <p><strong>Processed members:</strong> ${memberNames.length > 0 ? memberNames.join(', ') : 'No members'}</p>
                        </div>
                    `;
                } catch (error) {
                    output.innerHTML += `
                        <div style="margin: 10px 0; padding: 10px; border: 1px solid red;">
                            <h3 style="color: red;">❌ ${testCase.name}</h3>
                            <p><strong>Error:</strong> ${error.message}</p>
                        </div>
                    `;
                }
            });

            // Test the string parsing logic for legacy format
            output.innerHTML += `
                <div style="margin: 20px 0; padding: 10px; border: 2px solid blue;">
                    <h3>String Parsing Test</h3>
                    <div id="string-test"></div>
                </div>
            `;

            const stringTestDiv = document.getElementById('string-test');
            const testString = 'John Doe (4.0), Jane Smith (3.5), Bob Johnson (3.0)';
            
            try {
                const memberStrings = testString.split(',').map(s => s.trim());
                const parsedMembers = memberStrings.map(memberStr => {
                    const match = memberStr.match(/^(.+?)\s*\(([0-9.]+)\)$/);
                    if (match) {
                        const name = match[1].trim();
                        const gpa = parseFloat(match[2]);
                        let tier = 'LOW';
                        if (gpa >= 3.80) tier = 'HIGH';
                        else if (gpa >= 3.30) tier = 'MEDIUM';
                        
                        return { name, gpa, tier, matricNumber: 'N/A' };
                    }
                    return { name: memberStr, gpa: 0, tier: 'LOW', matricNumber: 'N/A' };
                });

                stringTestDiv.innerHTML = `
                    <p><strong>Input:</strong> ${testString}</p>
                    <p><strong>Parsed:</strong> ${JSON.stringify(parsedMembers, null, 2)}</p>
                `;
            } catch (error) {
                stringTestDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        // Run the test when page loads
        window.onload = testGroupMembersFix;
    </script>
</body>
</html>
