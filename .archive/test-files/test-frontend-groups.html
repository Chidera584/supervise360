<!DOCTYPE html>
<html>
<head>
    <title>Test Groups API</title>
</head>
<body>
    <h1>Testing Groups API</h1>
    <div id="result"></div>
    
    <script>
        async function testGroupsAPI() {
            try {
                // Get token from localStorage (assuming user is logged in)
                const token = localStorage.getItem('supervise360_token');
                
                if (!token) {
                    document.getElementById('result').innerHTML = '<p style="color: red;">No token found. Please login first.</p>';
                    return;
                }
                
                console.log('Token found:', token);
                
                const response = await fetch('http://localhost:5000/api/groups', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                console.log('API Response:', data);
                
                document.getElementById('result').innerHTML = `
                    <h2>API Response:</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        // Run test when page loads
        testGroupsAPI();
    </script>
</body>
</html>
