<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend Data Flow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Frontend Data Flow Test</h1>
    
    <div class="section info">
        <h3>Test Status</h3>
        <div id="status">Initializing...</div>
    </div>
    
    <div class="section">
        <h3>Actions</h3>
        <button onclick="testLogin()">1. Test Login</button>
        <button onclick="testGroupsAPI()">2. Test Groups API</button>
        <button onclick="testLocalStorage()">3. Check LocalStorage</button>
        <button onclick="clearCache()">4. Clear Cache</button>
    </div>
    
    <div class="section">
        <h3>Results</h3>
        <div id="results"></div>
    </div>
    
    <script>
        let authToken = null;
        
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<span class="${type}">${message}</span>`;
        }
        
        function addResult(title, data, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `section ${type}`;
            resultDiv.innerHTML = `
                <h4>${title}</h4>
                <pre>${typeof data === 'object' ? JSON.stringify(data, null, 2) : data}</pre>
            `;
            resultsDiv.appendChild(resultDiv);
        }
        
        async function testLogin() {
            updateStatus('Testing login...', 'info');
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@supervise360.com',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.data?.token) {
                    authToken = data.data.token;
                    localStorage.setItem('supervise360_token', authToken);
                    addResult('Login Test', 'SUCCESS: Token obtained and stored', 'success');
                    updateStatus('Login successful', 'success');
                } else {
                    addResult('Login Test', `FAILED: ${data.message}`, 'error');
                    updateStatus('Login failed', 'error');
                }
            } catch (error) {
                addResult('Login Test', `ERROR: ${error.message}`, 'error');
                updateStatus('Login error', 'error');
            }
        }
        
        async function testGroupsAPI() {
            updateStatus('Testing groups API...', 'info');
            
            if (!authToken) {
                authToken = localStorage.getItem('supervise360_token');
            }
            
            if (!authToken) {
                addResult('Groups API Test', 'ERROR: No auth token. Please login first.', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:5000/api/groups', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addResult('Groups API Test', {
                        success: true,
                        groupCount: data.data?.length || 0,
                        userDepartment: data.userDepartment,
                        isSystemAdmin: data.isSystemAdmin,
                        sampleGroup: data.data?.[0] || null
                    }, 'success');
                    updateStatus(`Groups API successful - ${data.data?.length || 0} groups found`, 'success');
                } else {
                    addResult('Groups API Test', `FAILED: ${data.message || data.error}`, 'error');
                    updateStatus('Groups API failed', 'error');
                }
            } catch (error) {
                addResult('Groups API Test', `ERROR: ${error.message}`, 'error');
                updateStatus('Groups API error', 'error');
            }
        }
        
        function testLocalStorage() {
            updateStatus('Checking localStorage...', 'info');
            
            const keys = [
                'supervise360_token',
                'supervise360_system_groups',
                'supervise360_system_groups_backup'
            ];
            
            const storageData = {};
            keys.forEach(key => {
                const value = localStorage.getItem(key);
                if (value) {
                    try {
                        storageData[key] = JSON.parse(value);
                    } catch {
                        storageData[key] = value;
                    }
                } else {
                    storageData[key] = null;
                }
            });
            
            addResult('LocalStorage Check', storageData, 'info');
            updateStatus('LocalStorage checked', 'success');
        }
        
        function clearCache() {
            updateStatus('Clearing cache...', 'info');
            
            localStorage.removeItem('supervise360_system_groups');
            localStorage.removeItem('supervise360_system_groups_backup');
            
            addResult('Cache Clear', 'Groups cache cleared from localStorage', 'success');
            updateStatus('Cache cleared', 'success');
        }
        
        // Auto-run tests on page load
        window.onload = function() {
            updateStatus('Ready to test', 'success');
            
            // Check if we already have a token
            const existingToken = localStorage.getItem('supervise360_token');
            if (existingToken) {
                authToken = existingToken;
                addResult('Initial Check', 'Found existing auth token', 'info');
            }
        };
    </script>
</body>
</html>
