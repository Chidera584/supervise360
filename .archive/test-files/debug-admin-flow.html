<!DOCTYPE html>
<html>
<head>
    <title>Debug Admin Login Flow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
        input { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>Admin Login Debug Tool</h1>
    
    <div>
        <h3>Test Admin Login</h3>
        <input type="email" id="email" value="admin@supervise360.com" placeholder="Email">
        <input type="password" id="password" value="admin123" placeholder="Password">
        <button onclick="testLogin()">Test Login</button>
    </div>
    
    <div>
        <h3>Test Current User</h3>
        <button onclick="testCurrentUser()">Get Current User</button>
        <button onclick="clearToken()">Clear Token</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        
        function addResult(message, isSuccess = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.insertBefore(div, results.firstChild);
        }
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                addResult('Attempting login...', true);
                
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('supervise360_token', data.data.token);
                    addResult(`✅ Login successful! User: ${data.data.user.first_name} ${data.data.user.last_name}, Role: ${data.data.user.role}`, true);
                    addResult(`Token stored: ${data.data.token.substring(0, 50)}...`, true);
                } else {
                    addResult(`❌ Login failed: ${data.message}`, false);
                }
            } catch (error) {
                addResult(`❌ Login error: ${error.message}`, false);
            }
        }
        
        async function testCurrentUser() {
            const token = localStorage.getItem('supervise360_token');
            
            if (!token) {
                addResult('❌ No token found. Please login first.', false);
                return;
            }
            
            try {
                addResult('Testing current user endpoint...', true);
                
                const response = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    addResult(`✅ Current user: ${data.data.user.first_name} ${data.data.user.last_name}, Role: ${data.data.user.role}`, true);
                } else {
                    addResult(`❌ Current user failed: ${data.message}`, false);
                }
            } catch (error) {
                addResult(`❌ Current user error: ${error.message}`, false);
            }
        }
        
        function clearToken() {
            localStorage.removeItem('supervise360_token');
            addResult('Token cleared', true);
        }
        
        // Check if token exists on load
        window.onload = function() {
            const token = localStorage.getItem('supervise360_token');
            if (token) {
                addResult(`Token found: ${token.substring(0, 50)}...`, true);
            } else {
                addResult('No token found', true);
            }
        }
    </script>
</body>
</html>
